<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Portfolio</title>
    <link rel="stylesheet" href="tech-minimal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Scanline Effect -->
    <div class="scanline"></div>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <div class="logo">DEV_PORTFOLIO</div>
                <div class="nav-links">
                    <a href="#experience">EXPERIENCE</a>
                    <a href="#projects">PROJECTS</a>
                    <a href="#skills">SKILLS</a>
                    <a href="#contact">CONTACT</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1 id="hero-name">
                <span>DEV</span>_PORTFOLIO
            </h1>
            <p class="subtitle terminal-line blink" id="hero-subtitle">
                <!-- Subtitle will be populated by JS -->
            </p>
            <div class="contact-info" id="contact-info">
                <!-- Contact info will be populated by JS -->
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">TECH_STACK</h3>
                <div class="skills-list" id="skills-list">
                    <!-- Skills will be populated by JS -->
                </div>
            </div>
            
            <div class="sidebar-section">
                <h3 class="sidebar-title">EDUCATION</h3>
                <div class="education-list" id="education-list">
                    <!-- Education will be populated by JS -->
                </div>
            </div>
            
            <div class="sidebar-section">
                <h3 class="sidebar-title">CERTIFICATIONS</h3>
                <div class="certifications-list" id="certifications-list">
                    <!-- Certifications will be populated by JS -->
                </div>
            </div>
            
            <div class="sidebar-section">
                <h3 class="sidebar-title">LANGUAGES</h3>
                <div class="languages-list" id="languages-list">
                    <!-- Languages will be populated by JS -->
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="content">
            <!-- Summary Section -->
            <section class="section">
                <h2 class="section-title">PROFILE_SUMMARY</h2>
                <p class="summary" id="professional-summary">
                    <!-- Summary will be populated by JS -->
                </p>
            </section>

            <!-- Experience Section -->
            <section class="section" id="experience">
                <h2 class="section-title">WORK_EXPERIENCE</h2>
                <div class="timeline" id="experience-timeline">
                    <!-- Experience will be populated by JS -->
                </div>
            </section>

            <!-- Projects Section -->
            <section class="section" id="projects">
                <h2 class="section-title">PROJECTS</h2>
                <div class="projects-grid" id="projects-grid">
                    <!-- Projects will be populated by JS -->
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer" id="contact">
        <div class="footer-content">
            <div class="social-links" id="social-links">
                <!-- Social links will be populated by JS -->
            </div>
            <div class="copyright">
                <p class="terminal-line">
                    <span id="current-year"></span> 
                    <span id="footer-name">DEV_PORTFOLIO</span> 
                    <span class="blink">_</span>
                </p>
            </div>
        </div>
    </footer>

    <!-- Minimal container styles -->
    <style>
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .terminal-line {
            padding-left: 1.5rem;
        }
        
        .terminal-line::before {
            content: '$';
            color: var(--primary);
            position: absolute;
            left: 0;
        }
    </style>

    <script src="script.js"></script>
</body>
</html>
